<script>
AFRAME.registerComponent('move-thumbstick', {
  schema: { speed: { default: 4.2 } },
  init: function () {
    this.rig = document.querySelector('#rig');
    this.axis = { x: 0, y: 0 };
    this.el.addEventListener('thumbstickmoved', (e) => { this.axis.x = e.detail.x; this.axis.y = e.detail.y; });
  },
  tick: function (time, dt) {
    if (!this.rig) return;
    const ax = this.axis.x || 0, ay = this.axis.y || 0;
    if (Math.abs(ax) < 0.08 && Math.abs(ay) < 0.08) return;
    const cam = document.querySelector('#cam');
    const yaw = cam.object3D.rotation.y;
    const speed = this.data.speed * (dt / 1000);
    const dx = (Math.sin(yaw) * -ay + Math.cos(yaw) * ax) * speed;
    const dz = (Math.cos(yaw) * -ay - Math.sin(yaw) * ax) * speed;
    this.rig.object3D.position.x += dx;
    this.rig.object3D.position.z += dz;
  }
});
AFRAME.registerComponent('snap-turn', {
  schema: { angle: { default: 30 } },
  init: function () {
    this.rig = document.querySelector('#rig'); this.ready = true;
    this.el.addEventListener('thumbstickmoved', (e) => {
      const x = e.detail.x;
      if (!this.ready) { if (Math.abs(x) < 0.2) this.ready = true; return; }
      if (x > 0.85) { this.rig.object3D.rotation.y -= THREE.MathUtils.degToRad(this.data.angle); this.ready = false; }
      else if (x < -0.85) { this.rig.object3D.rotation.y += THREE.MathUtils.degToRad(this.data.angle); this.ready = false; }
    });
  }
});
AFRAME.registerComponent('billboard-y', {
  tick: function () {
    const cam = document.querySelector('#cam'); if (!cam) return;
    const cp = new THREE.Vector3(), op = new THREE.Vector3();
    cam.object3D.getWorldPosition(cp); this.el.object3D.getWorldPosition(op);
    this.el.object3D.rotation.y = Math.atan2(cp.x - op.x, cp.z - op.z);
  }
});

AFRAME.registerComponent('face-target-y', {
  schema: { target: { type: 'selector' } },
  tick: function () {
    if (!this.data.target) return;
    const targetPos = new THREE.Vector3();
    const ownPos = new THREE.Vector3();
    this.data.target.object3D.getWorldPosition(targetPos);
    this.el.object3D.getWorldPosition(ownPos);
    this.el.object3D.rotation.y = Math.atan2(targetPos.x - ownPos.x, targetPos.z - ownPos.z);
  }
});
AFRAME.registerComponent('starfield', {
  init: function () {
    const g = new THREE.Group(), geom = new THREE.BufferGeometry(), count = 2400;
    const pos = new Float32Array(count*3);
    for (let i=0;i<count;i++) {
      const r = 34 + Math.random()*94, theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1);
      pos[i*3] = Math.sin(phi)*Math.cos(theta)*r;
      pos[i*3+1] = Math.cos(phi)*r*0.68 + 2;
      pos[i*3+2] = Math.sin(phi)*Math.sin(theta)*r;
    }
    geom.setAttribute('position', new THREE.BufferAttribute(pos,3));
    const mat = new THREE.PointsMaterial({color:0xdde8ff,size:0.15,sizeAttenuation:true,transparent:true,opacity:0.92});
    g.add(new THREE.Points(geom, mat));
    this.el.setObject3D('mesh', g);
  }
});
AFRAME.registerComponent('schrodinger-cube-v38', {
  init: function () {
    const THREE = AFRAME.THREE;
    const root = new THREE.Group();
    const cubeGroup = new THREE.Group();
    const motifGroup = new THREE.Group();

    const parallelDir = new THREE.Vector3(0.72, -0.69, 0.0).normalize();
    const motifScale = 1.0;

    const edgeMat = new THREE.MeshStandardMaterial({ color: 0xc7dcff, emissive: 0x6b8fff, emissiveIntensity: 0.88, metalness: 0.82, roughness: 0.14 });
    const nodeMat = new THREE.MeshStandardMaterial({ color: 0xf7fbff, emissive: 0x80a6ff, emissiveIntensity: 1.2, metalness: 0.12, roughness: 0.08 });
    const goldMat = new THREE.MeshStandardMaterial({ color: 0xebca72, emissive: 0xa27416, emissiveIntensity: 0.58, metalness: 0.84, roughness: 0.22 });
    const faintMat = new THREE.LineDashedMaterial({ color: 0x8aa5ff, dashSize: 0.30, gapSize: 0.22, transparent: true, opacity: 0.45 });

    const palette = [
      {body:0x5e72e4, emit:0x3646d6},
      {body:0x9a5cff, emit:0x6b2ed6},
      {body:0x1fb8ff, emit:0x1175c9},
      {body:0x18d0b9, emit:0x0d9485},
      {body:0xea62ce, emit:0xa23190},
      {body:0xff9342, emit:0xd16015},
      {body:0x7db9ff, emit:0x4a76da},
      {body:0xcf74ff, emit:0x9442c3}
    ];

    // Adjusted to match the reference: a larger back/left face and a smaller right/leading face.
    const nodes = [
      new THREE.Vector3(-13.0, -8.0,  4.2),  // 0 back square lower-left
      new THREE.Vector3( -0.8, -7.8,  4.0),  // 1 back square lower-right
      new THREE.Vector3(  1.6,  4.6,  3.9),  // 2 back square upper-right
      new THREE.Vector3( -8.4,  9.2,  4.1),  // 3 back square upper-left
      new THREE.Vector3( -1.24, -2.10, -3.80), // 4 front square lower-left (smaller)
      new THREE.Vector3(  7.06, -1.96, -3.93), // 5 front square lower-right
      new THREE.Vector3(  8.69,  6.47, -4.00), // 6 front square upper-right
      new THREE.Vector3(  1.89,  9.60, -3.87)  // 7 front square upper-left
    ];
    const edges = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
    const edgeComponentMap = {0:'coil',1:'coil',2:'coil',3:'coil',4:'coil',5:'coil',6:'coil',7:'coil',8:'coil',9:'coil',10:'coil',11:'coil'};

    function rod(groupTarget, p0, p1, radius, mat) {
      const dir = new THREE.Vector3().subVectors(p1, p0);
      const len = dir.length();
      const geom = new THREE.CylinderGeometry(radius, radius, len, 10);
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.copy(new THREE.Vector3().addVectors(p0, p1).multiplyScalar(0.5));
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.normalize());
      groupTarget.add(mesh);
    }

    function createComponent(type, position, tangent) {
      const comp = new THREE.Group();
      const axis = new THREE.Vector3(1,0,0);
      const q = new THREE.Quaternion().setFromUnitVectors(axis, tangent.clone().normalize());
      comp.quaternion.copy(q);
      comp.position.copy(position);
      if (type === 'coil') {
        for (let i=0;i<4;i++) {
          const tor = new THREE.Mesh(new THREE.TorusGeometry(0.26,0.06,10,20), goldMat);
          tor.rotation.y = Math.PI/2;
          tor.position.x = -0.54 + i*0.36;
          comp.add(tor);
        }
      } else {
        const capMat = new THREE.MeshStandardMaterial({ color: 0x4d6fe4, emissive: 0x2b47c6, emissiveIntensity: 0.60, metalness: 0.72, roughness: 0.22 });
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.36,0.36,1.56,18), capMat);
        body.rotation.z = Math.PI/2;
        comp.add(body);
        const r1 = new THREE.Mesh(new THREE.TorusGeometry(0.30,0.044,10,20), goldMat);
        r1.rotation.y = Math.PI/2; r1.position.x = -0.48;
        const r2 = r1.clone(); r2.position.x = 0.48;
        comp.add(r1); comp.add(r2);
      }
      cubeGroup.add(comp);
    }

    const backFaceCenter = new THREE.Vector3()
      .add(nodes[0]).add(nodes[1]).add(nodes[2]).add(nodes[3])
      .multiplyScalar(0.25);
    const frontFaceCenter = new THREE.Vector3()
      .add(nodes[4]).add(nodes[5]).add(nodes[6]).add(nodes[7])
      .multiplyScalar(0.25);
    const interiorCenter = backFaceCenter.clone().add(frontFaceCenter).multiplyScalar(0.5);

    function makeCurve(p0, p1, edgeIndex) {
      const mid = p0.clone().add(p1).multiplyScalar(0.5);
      const tangent = p1.clone().sub(p0).normalize();
      const radial = mid.clone().normalize();
      let normal = tangent.clone().cross(radial).cross(tangent);
      if (normal.length() < 0.001) normal = radial.clone();
      normal.normalize();

      // Back-face and front-face square edges are only slightly convex.
      let bow = 0.18 + p0.distanceTo(p1) * 0.010;
      let control = mid.clone().add(normal.multiplyScalar(bow));
      if (edgeIndex === 3) control.y += 0.03;

      // Only the four connecting struts (indices 8-11) bow inward more convex.
      if (edgeIndex >= 8) {
        const inward = interiorCenter.clone().sub(mid);
        if (inward.length() > 0.001) inward.normalize();
        else inward.set(0, 0, -1);
        control = mid.clone()
          .add(inward.multiplyScalar(1.25))
          .add(normal.clone().multiplyScalar(0.08));
      }
      return new THREE.QuadraticBezierCurve3(p0, control, p1);
    }

    function addNodeSpokes(origin, mat) {
      const spokeLen = 0.52;
      const spokeRadius = 0.016;
      const dirs = [
        new THREE.Vector3(0,1,0), new THREE.Vector3(0,-1,0),
        new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0),
        new THREE.Vector3(0.75,0.75,0), new THREE.Vector3(-0.62,-0.78,0)
      ];
      dirs.forEach((dir) => {
        const m = new THREE.Mesh(new THREE.CylinderGeometry(spokeRadius, spokeRadius, spokeLen, 8), mat);
        const midpoint = origin.clone().add(dir.clone().normalize().multiplyScalar(spokeLen/2));
        m.position.copy(midpoint);
        m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
        motifGroup.add(m);
      });
    }

    function addNodeMotif(nodeIndex) {
      const origin = nodes[nodeIndex].clone();
      const col = palette[nodeIndex % palette.length];
      const branchMat = new THREE.MeshStandardMaterial({ color: col.body, emissive: col.emit, emissiveIntensity: 0.90, metalness: 0.70, roughness: 0.16 });
      const glowMat = new THREE.MeshBasicMaterial({ color: col.body, transparent: true, opacity: 0.18 });
      addNodeSpokes(origin, branchMat);

      const motif = new THREE.Group();
      motif.position.copy(origin);
      // Keep all vectors parallel while anchored at the nodes.
      motif.quaternion.setFromUnitVectors(new THREE.Vector3(1,0,0), parallelDir);

      rod(motif, new THREE.Vector3(-0.52, 0.0, 0), new THREE.Vector3(0.0, 0.0, 0), 0.014 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(-0.52, 0.0, 0), new THREE.Vector3(0.0, 0.0, 0), 0.032 * motifScale, glowMat);

      rod(motif, new THREE.Vector3(0.0, 0.0, 0), new THREE.Vector3(0.0, 0.34, 0), 0.012 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(0.0, 0.0, 0), new THREE.Vector3(0.0,-0.34, 0), 0.012 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(1.18, 0.34, 0), new THREE.Vector3(1.18, 0.0, 0), 0.012 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(1.18, 0.0, 0), new THREE.Vector3(1.18,-0.34, 0), 0.012 * motifScale, branchMat);

      rod(motif, new THREE.Vector3(0.0, 0.34, 0), new THREE.Vector3(0.24, 0.34, 0), 0.012 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(0.96, 0.34, 0), new THREE.Vector3(1.18, 0.34, 0), 0.012 * motifScale, branchMat);
      [0.34,0.52,0.70,0.88].forEach((x) => {
        const tor = new THREE.Mesh(new THREE.TorusGeometry(0.10 * motifScale,0.017 * motifScale,10,20), goldMat);
        tor.rotation.y = Math.PI/2;
        tor.position.set(x, 0.34, 0);
        motif.add(tor);
      });

      rod(motif, new THREE.Vector3(0.0,-0.34,0), new THREE.Vector3(0.44,-0.34,0), 0.012 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(0.74,-0.34,0), new THREE.Vector3(1.18,-0.34,0), 0.012 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(0.52,-0.50,0), new THREE.Vector3(0.52,-0.18,0), 0.014 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(0.66,-0.50,0), new THREE.Vector3(0.66,-0.18,0), 0.014 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(0.52,-0.50,0), new THREE.Vector3(0.52,-0.18,0), 0.030 * motifScale, glowMat);
      rod(motif, new THREE.Vector3(0.66,-0.50,0), new THREE.Vector3(0.66,-0.18,0), 0.030 * motifScale, glowMat);

      rod(motif, new THREE.Vector3(1.18, 0.0, 0), new THREE.Vector3(1.92, 0.0, 0), 0.014 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(1.18, 0.0, 0), new THREE.Vector3(1.92, 0.0, 0), 0.032 * motifScale, glowMat);
      rod(motif, new THREE.Vector3(1.92, 0.0, 0), new THREE.Vector3(1.62, 0.20, 0), 0.014 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(1.92, 0.0, 0), new THREE.Vector3(1.62,-0.20, 0), 0.014 * motifScale, branchMat);
      rod(motif, new THREE.Vector3(1.92, 0.0, 0), new THREE.Vector3(1.62, 0.20, 0), 0.028 * motifScale, glowMat);
      rod(motif, new THREE.Vector3(1.92, 0.0, 0), new THREE.Vector3(1.62,-0.20, 0), 0.028 * motifScale, glowMat);

      motifGroup.add(motif);
    }

    nodes.forEach((p, i) => {
      const s = new THREE.Mesh(new THREE.SphereGeometry(0.14, 18, 18), nodeMat);
      s.position.copy(p);
      cubeGroup.add(s);
      const h = new THREE.Mesh(new THREE.SphereGeometry(0.21, 12, 12), new THREE.MeshBasicMaterial({color:0x7aa0ff,transparent:true,opacity:0.13}));
      h.position.copy(p);
      cubeGroup.add(h);
      addNodeMotif(i);
    });

    edges.forEach((e,i)=>{
      const curve = makeCurve(nodes[e[0]], nodes[e[1]], i);
      const geom = new THREE.TubeGeometry(curve, 42, 0.18, 12, false);
      cubeGroup.add(new THREE.Mesh(geom, edgeMat));
      const t = (i%2===0)?0.44:0.58;
      createComponent(edgeComponentMap[i], curve.getPointAt(t), curve.getTangentAt(t));
    });

    [[0,7],[1,6],[3,4]].forEach(pair=>{
      const g = new THREE.BufferGeometry().setFromPoints([nodes[pair[0]], nodes[pair[1]]]);
      const line = new THREE.Line(g, faintMat); line.computeLineDistances(); cubeGroup.add(line);
    });

    root.add(cubeGroup);
    root.add(motifGroup);
    root.rotation.x = THREE.MathUtils.degToRad(-10);
    root.rotation.y = THREE.MathUtils.degToRad(18);
    root.position.set(0, 2.6, 0);
    root.scale.set(5, 5, 5);
    this.el.setObject3D('mesh', root);
  },
  tick: function(){
    const obj = this.el.getObject3D('mesh');
    if (obj) obj.rotation.y += 0.00018;
  }
});
</script>
